name: Release

# Triggered by a push of a semantic-version tag (e.g. 0.1.0, 1.2.3-beta.1).
#
# Versioning strategy (pre-self-hosting)
# ---------------------------------------
# Until Release Regent processes its own repository, versions are managed via
# manually pushed git tags on the master branch:
#
#   git tag -a 0.1.0 -m "Release 0.1.0"
#   git push origin 0.1.0
#
# Once self-hosted, the release PR workflow will create these tags automatically.
#
# Safety note: always push release tags on commits where CI is green.
# This workflow does not gate on CI status; a tag pushed on a red commit
# will still produce and publish an image.
#
# Image registry
# --------------
# Images are published to GitHub Container Registry:
#   ghcr.io/pvandervelde/release-regent:<version>
#   ghcr.io/pvandervelde/release-regent:latest   (stable releases only)
#   ghcr.io/pvandervelde/release-regent:sha-<short-sha>

on:
    push:
        tags:
            # Stable releases: 0.1.0, 1.2.3
            - "[0-9]+.[0-9]+.[0-9]+"
            # Pre-releases: 0.1.0-beta.1, 1.0.0-rc.2
            - "[0-9]+.[0-9]+.[0-9]+-*"

# Minimal workflow-level permissions. Elevated permissions are scoped to the
# release-container job to avoid granting them to any jobs added in future.
permissions:
    contents: read

jobs:
    release-container:
        name: Build and publish container image
        runs-on: ubuntu-latest
        permissions:
            packages: write    # Push container image and OCI referrer attachments to ghcr.io
            id-token: write    # Required for Sigstore/Fulcio OIDC signing during attestation
            attestations: write # Required to write attestation records to the GitHub Attestations store

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  # Full history is not required for image builds, but fetch-depth: 1
                  # is the default and is correct here.
                  fetch-depth: 1

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Extract OCI-compatible tags and labels from the Git context.
            # For a tag push of 0.1.0 this produces:
            #   ghcr.io/pvandervelde/release-regent:0.1.0
            #   ghcr.io/pvandervelde/release-regent:0.1
            #   ghcr.io/pvandervelde/release-regent:0
            #   ghcr.io/pvandervelde/release-regent:latest  (stable only)
            #   ghcr.io/pvandervelde/release-regent:sha-<abbrev>
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/release-regent
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,prefix=sha-
                  labels: |
                      org.opencontainers.image.title=Release Regent
                      org.opencontainers.image.description=Automated semantic versioning and release management webhook server
                      org.opencontainers.image.vendor=pvandervelde
                      org.opencontainers.image.documentation=https://github.com/pvandervelde/release_regent/blob/master/README.md

            # Scan the Cargo workspace against Cargo.lock to produce a source-level SBOM
            # before the Docker build so it is always available even if the build fails.
            - name: Generate Rust source SBOM
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  path: .
                  artifact-name: sbom-source.spdx.json
                  output-file: /tmp/sbom-source.spdx.json
                  format: spdx-json
                  # Workflow artifacts expire after 90 days and are a convenience copy only.
                  # The permanent, verifiable copy is the OCI referrer pushed by the attest step.
                  upload-artifact: true
                  # SBOMs are not attached to GitHub Releases; the canonical distribution
                  # mechanism is OCI referrers and the GitHub Attestations API. See ADR-008.
                  upload-release-assets: false

            - name: Build and push container image
              id: build
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  # Disable BuildKit inline provenance so we generate it ourselves
                  # via actions/attest-build-provenance, avoiding duplicate records.
                  provenance: false
                  # Explicitly disable BuildKit SBOM generation (off by default) so the
                  # intent is clear: SBOMs are produced by anchore/sbom-action instead.
                  sbom: false

            # Scan the published image with Syft to produce a full container SBOM that
            # covers all OS packages and binaries installed in the final image layer.
            - name: Generate container SBOM
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/release-regent@${{ steps.build.outputs.digest }}
                  artifact-name: sbom-container.spdx.json
                  output-file: /tmp/sbom-container.spdx.json
                  format: spdx-json
                  # Workflow artifacts expire after 90 days and are a convenience copy only.
                  # The permanent, verifiable copy is the OCI referrer pushed by the attest step.
                  upload-artifact: true
                  # SBOMs are not attached to GitHub Releases; the canonical distribution
                  # mechanism is OCI referrers and the GitHub Attestations API. See ADR-008.
                  upload-release-assets: false

            # Attach the Rust source SBOM as a signed attestation on the container image.
            # This links Cargo dependency metadata to the published artifact.
            - name: Attest Rust source SBOM
              uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
              with:
                  subject-name: ghcr.io/${{ github.repository_owner }}/release-regent
                  subject-digest: ${{ steps.build.outputs.digest }}
                  sbom-path: /tmp/sbom-source.spdx.json
                  push-to-registry: true

            # Attach the container SBOM as a signed attestation on the container image.
            - name: Attest container SBOM
              uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
              with:
                  subject-name: ghcr.io/${{ github.repository_owner }}/release-regent
                  subject-digest: ${{ steps.build.outputs.digest }}
                  sbom-path: /tmp/sbom-container.spdx.json
                  push-to-registry: true

            # Generate a SLSA build provenance attestation signed via Sigstore/Fulcio
            # using the GitHub OIDC identity of this workflow run.
            - name: Attest build provenance
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
              with:
                  subject-name: ghcr.io/${{ github.repository_owner }}/release-regent
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
