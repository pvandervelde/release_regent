# =============================================================================
# Release Regent — app-level configuration (Level 2 of 5 in the hierarchy)
# =============================================================================
# This file is the APP-LEVEL baseline loaded from the local CONFIG_DIR.
# It can be overridden by:
#   3. global policy  — {org}/.release-regent/global.toml  (metadata repo)
#   4. group policy   — {org}/.release-regent/groups/{group}.toml
#   5. repo dotfile   — {repo}/.release-regent.toml
#
# Fields declared in locked_fields at a higher level cannot be overridden
# by this file or any lower level.
#
# The server looks for a file named release-regent.toml in
# the CONFIG_DIR directory (default: /config inside the container).
#
# Full reference: docs/user/reference/configuration.md
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# Core settings
# ─────────────────────────────────────────────────────────────────────────────

[core]
# Prefix prepended to version numbers in tags and PR titles.
# NOTE: This is the app-level default. The global policy in the test metadata
# repo overrides this to "vGLOBAL-" so you can see level 3 taking effect.
# The repo dotfile further overrides it to "v" (the normal tag prefix).
version_prefix = "vAPP-"

[core.branches]
# The default branch of the repository.
main = "main"

# ─────────────────────────────────────────────────────────────────────────────
# Versioning
# ─────────────────────────────────────────────────────────────────────────────

[versioning]
# How to calculate the next version using conventional commits (default).
# To use an external command instead, comment out or remove this line and
# uncomment the [versioning.strategy.external] block below.
strategy = "conventional"

# External versioning strategy — comment out `strategy = "conventional"` above
# before uncommenting this block (both cannot coexist in TOML).
# [versioning.strategy.external]
# command = "./scripts/calculate-version.sh"
# env_vars = {}
# timeout_ms = 30000

# Allow contributors to override the calculated bump via PR comments
# (e.g. /override-bump minor).
allow_override = true

# ─────────────────────────────────────────────────────────────────────────────
# Release pull request
# ─────────────────────────────────────────────────────────────────────────────

[release_pr]
# Template for the release PR title. ${version} is replaced at runtime.
title_template = "chore(release): ${version}"

# Template for the release PR body. ${changelog} is replaced at runtime.
body_template = "## Changelog\n\n${changelog}"

# Create release PRs as drafts.
draft = false

# ─────────────────────────────────────────────────────────────────────────────
# GitHub releases
# ─────────────────────────────────────────────────────────────────────────────

[releases]
# Publish releases as drafts (not publicly visible until manually published).
draft = false

# Mark releases as pre-releases.
prerelease = false

# Auto-generate release notes from merged PRs in addition to the changelog.
generate_notes = true

# ─────────────────────────────────────────────────────────────────────────────
# Error handling / retries
# ─────────────────────────────────────────────────────────────────────────────

[error_handling]
max_retries = 5
backoff_multiplier = 2.0
initial_delay_ms = 1000

# ─────────────────────────────────────────────────────────────────────────────
# Notifications
# ─────────────────────────────────────────────────────────────────────────────

[notifications]
enabled = true

# How to report errors encountered during processing.
# Options: "github_issue" | "webhook" | "slack" | "none"
strategy = "github_issue"

[notifications.github_issue]
labels = ["release-regent", "bug"]
assignees = []
